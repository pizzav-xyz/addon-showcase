<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#12121A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E63946"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#FF6B35" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="525"/>
    <line x1="400" y1="0" x2="1200" y2="420"/>
    <line x1="600" y1="0" x2="1200" y2="315"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="525"/>
    <line x1="800" y1="0" x2="0" y2="420"/>
    <line x1="600" y1="0" x2="0" y2="315"/>
  </g>

  <!-- Glowing accent bar -->
  <rect x="60" y="250" width="120" height="4" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Main title -->
  <text x="60" y="310" font-family="Arial, sans-serif" font-weight="900" font-size="72" fill="white">
    PizzaV's
  </text>
  <text x="60" y="380" font-family="Arial, sans-serif" font-weight="900" font-size="56" fill="#FF6B35">
    Meteor Addon
  </text>

  <!-- Subtitle -->
  <text x="60" y="430" font-family="Arial, sans-serif" font-weight="400" font-size="24" fill="#888">
    The most innovative Client addon with features that work sometimes
  </text>

  <!-- Decorative elements -->
  <g filter="url(#glow)">
    <circle cx="1050" cy="180" r="60" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.3"/>
    <circle cx="1050" cy="180" r="40" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.2"/>
    <circle cx="1100" cy="320" r="30" fill="none" stroke="#9D4EDD" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
